# roles/k8s-oss/tasks/metrics_server.yaml
# Metrics Server 설치
# 패치: --kubelet-insecure-tls, hostNetwork: true

---
- name: Metrics Server 설치 여부 확인
  command: kubectl get deployment metrics-server -n kube-system
  register: metrics_server_check
  changed_when: false
  failed_when: false
  environment:
    KUBECONFIG: "{{ kubeconfig_path }}"

- name: Metrics Server manifest 복사
  copy:
    src: metrics-server/metrics-server-{{ oss_versions.metrics_server }}.yaml
    dest: /tmp/metrics-server.yaml
    mode: '0644'
  when: metrics_server_check.rc != 0

- name: Metrics Server manifest에서 이미지 레지스트리 변경
  replace:
    path: /tmp/metrics-server.yaml
    regexp: 'registry.k8s.io/metrics-server'
    replace: '{{ harbor_registry }}/{{ harbor_project }}/metrics-server'
  when: metrics_server_check.rc != 0

- name: Metrics Server manifest 적용
  command: kubectl apply -f /tmp/metrics-server.yaml
  when: metrics_server_check.rc != 0
  environment:
    KUBECONFIG: "{{ kubeconfig_path }}"

- name: Metrics Server 패치 (--kubelet-insecure-tls)
  command: >
    kubectl patch deployment metrics-server -n kube-system
    --type='json'
    -p='[{"op": "add", "path": "/spec/template/spec/containers/0/args/-", "value": "--kubelet-insecure-tls"}]'
  when: metrics_server_check.rc != 0
  environment:
    KUBECONFIG: "{{ kubeconfig_path }}"
  register: patch_result
  failed_when: patch_result.rc != 0 and 'already exists' not in patch_result.stderr

- name: Metrics Server 패치 (hostNetwork)
  command: >
    kubectl patch deployment metrics-server -n kube-system
    --type='json'
    -p='[{"op": "add", "path": "/spec/template/spec/hostNetwork", "value": true}]'
  when: metrics_server_check.rc != 0
  environment:
    KUBECONFIG: "{{ kubeconfig_path }}"
  register: patch_result
  failed_when: patch_result.rc != 0 and 'already exists' not in patch_result.stderr

- name: Metrics Server Deployment Ready 대기
  command: kubectl rollout status deployment/metrics-server -n kube-system --timeout=300s
  when: metrics_server_check.rc != 0
  environment:
    KUBECONFIG: "{{ kubeconfig_path }}"
