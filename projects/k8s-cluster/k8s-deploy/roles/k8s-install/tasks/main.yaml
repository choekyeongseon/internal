# roles/k8s-install/tasks/main.yaml
# K8s 컴포넌트 설치: CRI-O, kubelet, kubeadm, kubectl

---
# ─────────────────────────────────────────────────────────────────────────────
# CRI-O 설치 (오프라인)
# ─────────────────────────────────────────────────────────────────────────────

- name: CRI-O RPM 설치 (오프라인)
  yum:
    name: "{{ rpm_bundle_path }}/crio-{{ crio_version }}/*.rpm"
    state: present
    disable_gpg_check: true
    disablerepo: "*"
  when: offline_install | default(true)

- name: CRI-O 서비스 시작 및 활성화
  systemd:
    name: crio
    state: started
    enabled: true
    daemon_reload: true

# ─────────────────────────────────────────────────────────────────────────────
# kubelet, kubeadm, kubectl 설치 (오프라인)
# ─────────────────────────────────────────────────────────────────────────────

- name: kubelet RPM 설치 (오프라인)
  yum:
    name: "{{ rpm_bundle_path }}/kubernetes-{{ k8s_version }}/kubelet-{{ k8s_rpm_version }}.rpm"
    state: present
    disable_gpg_check: true
    disablerepo: "*"
  when: offline_install | default(true)

- name: kubeadm RPM 설치 (오프라인)
  yum:
    name: "{{ rpm_bundle_path }}/kubernetes-{{ k8s_version }}/kubeadm-{{ k8s_rpm_version }}.rpm"
    state: present
    disable_gpg_check: true
    disablerepo: "*"
  when: offline_install | default(true)

- name: kubectl RPM 설치 (오프라인)
  yum:
    name: "{{ rpm_bundle_path }}/kubernetes-{{ k8s_version }}/kubectl-{{ k8s_rpm_version }}.rpm"
    state: present
    disable_gpg_check: true
    disablerepo: "*"
  when: offline_install | default(true)

# ─────────────────────────────────────────────────────────────────────────────
# kubelet 서비스 설정
# ─────────────────────────────────────────────────────────────────────────────

- name: kubelet 서비스 활성화 (시작은 kubeadm init/join 후)
  systemd:
    name: kubelet
    enabled: true
    daemon_reload: true
