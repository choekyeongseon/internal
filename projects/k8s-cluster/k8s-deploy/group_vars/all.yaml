# group_vars/all.yaml
# 전역 변수 정의 (버전 매핑 포함)

# ─────────────────────────────────────────────────────────────────────────────
# 기준 변수 (이 값만 변경하면 모든 버전 자동 분기)
# ─────────────────────────────────────────────────────────────────────────────

secloudit_version: "v2.0"  # v1.5 / v2.0 / v2.3 / v2.6

# ─────────────────────────────────────────────────────────────────────────────
# K8s 버전 매핑 (secloudit_version → k8s_version)
# ─────────────────────────────────────────────────────────────────────────────

k8s_version_map:
  v1.5: "1.23.17"
  v2.0: "1.27.8"
  # TODO: v2.3, v2.6 버전 확인 필요

# ─────────────────────────────────────────────────────────────────────────────
# 파생 변수 (자동 계산)
# ─────────────────────────────────────────────────────────────────────────────

k8s_version: "{{ k8s_version_map[secloudit_version] }}"
crio_version: "{{ k8s_version | regex_replace('^(\\d+\\.\\d+).*', '\\1') }}"

# K8s RPM 버전 매핑
k8s_rpm_version_map:
  "1.23.17": "1.23.17-0"
  "1.27.8": "1.27.8-150500.1.1"
  # TODO: 추가 버전 확인 필요

k8s_rpm_version: "{{ k8s_rpm_version_map[k8s_version] }}"

# ─────────────────────────────────────────────────────────────────────────────
# OSS 버전 매핑 (필요 시 secloudit_version별 분기)
# ─────────────────────────────────────────────────────────────────────────────

oss_versions:
  calico: "3.25.0"        # TODO: 버전별 분기 필요 시 map 구조로 변경
  ingress_nginx: "1.8.0"
  nfs_provisioner: "4.0.2"
  metrics_server: "0.6.3"
  prometheus: "2.45.0"
  argocd: "2.8.0"
  tekton: "0.50.0"
  istio: "1.18.0"
  kafka: "3.5.0"

# ─────────────────────────────────────────────────────────────────────────────
# Harbor 레지스트리 설정
# ─────────────────────────────────────────────────────────────────────────────

harbor_registry: "harbor.example.com"  # TODO: 실제 Harbor 주소로 변경
harbor_project: "secloudit"

# ─────────────────────────────────────────────────────────────────────────────
# 오프라인 설치 설정
# ─────────────────────────────────────────────────────────────────────────────

offline_install: true
rpm_bundle_path: "/opt/rpm-bundles"
