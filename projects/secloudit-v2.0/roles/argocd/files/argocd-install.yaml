---
# Placeholder - 실제 배포 시 버전 확정 후 공식 manifest 사용
# 아래는 ArgoCD 핵심 컴포넌트 구조 예시

apiVersion: v1
kind: ConfigMap
metadata:
  name: argocd-cm
  namespace: argocd
  labels:
    app.kubernetes.io/name: argocd-cm
    app.kubernetes.io/part-of: argocd
data:
  # TODO: ArgoCD 설정 확인 필요
  url: ""

---
apiVersion: v1
kind: ConfigMap
metadata:
  name: argocd-rbac-cm
  namespace: argocd
  labels:
    app.kubernetes.io/name: argocd-rbac-cm
    app.kubernetes.io/part-of: argocd
data:
  # TODO: RBAC 정책 확인 필요
  policy.csv: ""

---
apiVersion: v1
kind: Secret
metadata:
  name: argocd-secret
  namespace: argocd
  labels:
    app.kubernetes.io/name: argocd-secret
    app.kubernetes.io/part-of: argocd
type: Opaque
data:
  # TODO: admin 패스워드 vault 연동 필요
  # admin.password는 bcrypt 해시로 설정
  admin.password: ""

