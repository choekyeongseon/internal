---
# SECloudit v2.3 공통 변수
# 모든 호스트에 적용되는 변수 정의

# 이미지 레지스트리
image_registry: sample.harbor.com

# 포트 설정
keycloak_port: 8012
portal_port: 8010
admin_portal_port: 8011
mongodb_port: 27017
fluentd_port: 24224
chartmuseum_port: 5080
mysql_port: 3306

# 공통 설정
docker_compose_dir: /opt/secloudit
kubeconfig_path: /root/.kube/config  # TODO: 확인 필요

