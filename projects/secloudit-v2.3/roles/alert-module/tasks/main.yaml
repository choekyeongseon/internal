---
# alert-module role: Alert Module 배포 (신규, Kafka 의존)
# 설치 순서 8단계 (in-cluster)

- name: Ensure kubeconfig exists
  ansible.builtin.stat:
    path: "{{ kubeconfig_path }}"
  register: kubeconfig_stat
  failed_when: not kubeconfig_stat.stat.exists

- name: Check if Alert Module namespace exists
  ansible.builtin.shell: kubectl get namespace alert-module --no-headers 2>/dev/null | wc -l
  environment:
    KUBECONFIG: "{{ kubeconfig_path }}"
  register: alert_namespace
  changed_when: false
  failed_when: false

- name: Verify Kafka is ready (dependency)
  ansible.builtin.shell: kubectl get namespace kafka --no-headers 2>/dev/null | wc -l
  environment:
    KUBECONFIG: "{{ kubeconfig_path }}"
  register: kafka_ready
  failed_when: kafka_ready.stdout | int == 0

- name: Template Alert Module manifest
  ansible.builtin.template:
    src: alert-module.yaml.j2
    dest: /tmp/alert-module.yaml
    mode: '0644'

- name: Apply Alert Module manifest
  ansible.builtin.shell: kubectl apply -f /tmp/alert-module.yaml
  environment:
    KUBECONFIG: "{{ kubeconfig_path }}"
  when: alert_namespace.stdout | int == 0

- name: Wait for Alert Module to be ready
  ansible.builtin.shell: |
    kubectl wait --for=condition=available deployment/alert-module -n alert-module --timeout=300s
  environment:
    KUBECONFIG: "{{ kubeconfig_path }}"
  when: alert_namespace.stdout | int == 0
  failed_when: false  # TODO: Alert Module manifest 확인 후 조정
